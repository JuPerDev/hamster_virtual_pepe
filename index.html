<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mascota virtual hámster interactiva — aliméntala, juega, y escúchala hablar. Gratis y sin registro.">
  <title>🐹 Mi Hámster Virtual</title>
  <link rel="stylesheet" href="style.css?v=20260607-7">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐹</text></svg>">
</head>
<body>

  <!-- Volume Toggle -->
  <button class="volume-toggle" id="volume-toggle" aria-label="Activar/desactivar sonido">🔊</button>

  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="pet-name">
        <input
          type="text"
          class="name-input"
          id="pet-name-input"
          value="PEPE"
          maxlength="15"
          aria-label="Nombre de tu mascota"
        >
      </div>
      <div class="age-display" id="age-display">🕐 Edad: 0 min</div>
    </header>

    <!-- Mood Badge -->
    <div style="display: flex; align-items: center; justify-content: center;">
      <div class="mood-badge">
        <span class="mood-emoji" id="mood-emoji">😊</span>
        <span id="mood-text">Feliz</span>
      </div>
    </div>

    <!-- Hamster Scene -->
    <div class="hamster-scene">
      <div class="hamster idle" id="hamster">
        <canvas class="hamster-3d-canvas" id="hamster-3d-canvas" aria-hidden="true"></canvas>
        <!-- Body -->
        <div class="hamster-body">
          <div class="hamster-ilu"></div>
          
          <!-- Hat -->
          <div class="hamster-hat" id="hamster-hat" style="display: none;"></div>
          <!-- Glasses -->
          <div class="hamster-glasses" id="hamster-glasses" style="display: none;"></div>
        </div>
      </div>

      <!-- Zzz for sleeping -->
      <div class="zzz-container" id="zzz-container" style="display: none;">
        <span class="zzz">Z</span>
        <span class="zzz">z</span>
        <span class="zzz">Z</span>
      </div>

      <!-- Throwable Ball -->
      <div class="ball hint" id="throwable-ball" style="display: none; right: 10px; bottom: 30px;">
        <span class="ball-label">¡Lánzame!</span>
      </div>
    </div>

    <!-- Food Tray (sits below Pepe, not over his body) -->
    <div class="food-tray" id="food-tray">
      <div class="draggable-food seed-food hint" id="food-seed" data-food="seed" style="display: none;">
        🌻<span class="food-label">Semilla</span>
      </div>
      <div class="draggable-food carrot-food hint" id="food-carrot" data-food="carrot" style="display: none;">
        �<span class="food-label">Zanahoria</span>
      </div>
      <div class="draggable-food cheese-food hint" id="food-cheese" data-food="cheese" style="display: none;">
        🧀<span class="food-label">Quesito</span>
      </div>
    </div>

    <!-- Speech Bubble -->
    <div class="speech-bubble" id="speech-bubble">
      <span id="speech-text">...</span>
      <div class="typing-indicator" id="typing-indicator">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-container">
      <div class="stat-row">
        <span class="stat-icon">🌻</span>
        <span class="stat-label">Hambre</span>
        <div class="stat-bar-wrapper" id="hunger-wrapper">
          <div class="stat-bar hunger" id="hunger-bar" style="width: 80%"></div>
        </div>
        <span class="stat-value" id="hunger-value">80</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">💖</span>
        <span class="stat-label">Felicidad</span>
        <div class="stat-bar-wrapper" id="happiness-wrapper">
          <div class="stat-bar happiness" id="happiness-bar" style="width: 70%"></div>
        </div>
        <span class="stat-value" id="happiness-value">70</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">⚡</span>
        <span class="stat-label">Energía</span>
        <div class="stat-bar-wrapper" id="energy-wrapper">
          <div class="stat-bar energy" id="energy-bar" style="width: 90%"></div>
        </div>
        <span class="stat-value" id="energy-value">90</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">✨</span>
        <span class="stat-label">Limpieza</span>
        <div class="stat-bar-wrapper" id="cleanliness-wrapper">
          <div class="stat-bar cleanliness" id="cleanliness-bar" style="width: 85%"></div>
        </div>
        <span class="stat-value" id="cleanliness-value">85</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-container">
      <button class="action-btn feed" id="btn-feed">
        <span class="btn-icon">🌻</span>
        <span class="btn-label">Alimentar</span>
      </button>
      <button class="action-btn play" id="btn-play">
        <span class="btn-icon">🎾</span>
        <span class="btn-label">Jugar</span>
      </button>
      <button class="action-btn sleep" id="btn-sleep">
        <span class="btn-icon">🛏️</span>
        <span class="btn-label">Dormir</span>
      </button>
      <button class="action-btn clean" id="btn-clean">
        <span class="btn-icon">🛁</span>
        <span class="btn-label">Limpiar</span>
      </button>
      <button class="action-btn pet" id="btn-pet">
        <span class="btn-icon">🤗</span>
        <span class="btn-label">Acariciar</span>
      </button>
      <button class="action-btn talk" id="btn-talk">
        <span class="btn-icon">💬</span>
        <span class="btn-label">Hablar</span>
      </button>
      <button class="action-btn wardrobe" id="btn-wardrobe">
        <span class="btn-icon">🎩</span>
        <span class="btn-label">Gorros</span>
      </button>
      <button class="action-btn wardrobe" id="btn-glasses">
        <span class="btn-icon">🕶️</span>
        <span class="btn-label">Lentes</span>
      </button>
    </div>

    </div>

    <!-- Wardrobe Modal -->
    <div class="modal-overlay" id="wardrobe-modal">
      <div class="modal-card wardrobe-card">
        <h2>🎩 Los Gorros de Pepe</h2>
        <p>¡Elige un gorrito para tu hámster!</p>
        
        <div class="hat-grid">
          <button class="hat-option" data-hat="">🚫</button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/gorro_brujo.svg">
            <img src="assets/hamster_ilu/accesorios/gorro_brujo.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/corona_dorada.svg">
            <img src="assets/hamster_ilu/accesorios/corona_dorada.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/gorra_urbana.svg">
            <img src="assets/hamster_ilu/accesorios/gorra_urbana.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/gorro_lana_magenta.svg">
            <img src="assets/hamster_ilu/accesorios/gorro_lana_magenta.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/gorro_navideno.svg">
            <img src="assets/hamster_ilu/accesorios/gorro_navideno.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/sombrero_copa_profesional.svg">
            <img src="assets/hamster_ilu/accesorios/sombrero_copa_profesional.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="hat-option" data-hat="assets/hamster_ilu/accesorios/sombrero_cowboy.svg">
            <img src="assets/hamster_ilu/accesorios/sombrero_cowboy.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
        </div>

        <div class="modal-actions">
          <button class="modal-btn secondary" id="btn-wardrobe-close">Cerrar</button>
        </div>
      </div>
    </div>

    <!-- Glasses Modal -->
    <div class="modal-overlay" id="glasses-modal">
      <div class="modal-card wardrobe-card">
        <h2>🕶️ Los Lentes de Pepe</h2>
        <p>¡Elige unos lentes para tu hámster!</p>
        
        <div class="hat-grid" id="glasses-grid">
          <button class="glasses-option" data-glasses="">🚫</button>
          <button class="glasses-option" data-glasses="assets/hamster_ilu/lentes/celestes.svg">
            <img src="assets/hamster_ilu/lentes/celestes.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="glasses-option" data-glasses="assets/hamster_ilu/lentes/estrella.svg">
            <img src="assets/hamster_ilu/lentes/estrella.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="glasses-option" data-glasses="assets/hamster_ilu/lentes/negros.svg">
            <img src="assets/hamster_ilu/lentes/negros.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
          <button class="glasses-option" data-glasses="assets/hamster_ilu/lentes/rojos.svg">
            <img src="assets/hamster_ilu/lentes/rojos.svg" style="width: 50px; height: 50px; pointer-events: none;">
          </button>
        </div>

        <div class="modal-actions">
          <button class="modal-btn secondary" id="btn-glasses-close">Cerrar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js?v=20260608-1"></script>
</body>
</html>
